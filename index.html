<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slayer Inc — Rune Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bg-deep: #0a0608;
      --bg-panel: #120d10;
      --accent-primary: #c0392b;
      --accent-hot: #ff5a36;
      --accent-glow: #ff2244;
      --text-main: #e8d5c4;
      --text-muted: #8a7060;
      --border-dark: #2a1a1a;
      --special-gold: #f5c842;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(192, 57, 43, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 100% 0%, rgba(80, 20, 60, 0.2) 0%, transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(192, 57, 43, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(60, 20, 40, 0.15) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0 L40 20 L20 40 L0 20 Z' fill='none' stroke='%23c0392b' stroke-width='0.5' opacity='0.08'/%3E%3C/svg%3E");
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    @media (min-width: 1024px) {
      body { flex-direction: row; height: 100vh; overflow: hidden; }
    }

    .font-display { font-family: 'Cinzel Decorative', serif; }
    .font-body { font-family: 'Rajdhani', sans-serif; }
    .font-mono { font-family: 'Share Tech Mono', monospace; }

    .header-title {
      background: linear-gradient(to bottom, #ff8a65 0%, #ff5a36 40%, #c0392b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 34, 68, 0.35));
    }

    #sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border-dark);
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    @media (min-width: 1024px) {
      #sidebar {
        width: 340px;
        min-width: 340px;
        max-height: none !important;
        overflow-y: auto;
        height: 100vh;
      }
    }

    #sidebar.open { max-height: 2000px; }

    .input-game {
      background-color: #0f0a0b;
      border: 1px solid var(--border-dark);
      color: var(--text-main);
      border-radius: 8px;
      transition: 0.25s;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
    }

    .input-game:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(192, 57, 43, 0.25), inset 0 2px 6px rgba(0, 0, 0, 0.5);
      outline: none;
    }

    .custom-target-box {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border-dark);
      border-radius: 10px;
      box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.5);
    }

    .rune-clip {
      clip-path: polygon(
        0% 18px, 18px 0%, 28px 0%, 34px 6px,
        calc(100% - 34px) 6px, calc(100% - 28px) 0%, calc(100% - 18px) 0%, 100% 18px,
        100% calc(100% - 22px), calc(50% + 10px) calc(100% - 6px), 50% 100%,
        calc(50% - 10px) calc(100% - 6px), 0% calc(100% - 22px)
      );
    }

    .category-header {
      background: #050505;
      border: 1px solid rgba(180, 120, 60, 0.35);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
    }

    .category-header.rune-clip {
      filter: drop-shadow(0 0 14px var(--cat-glow, rgba(255, 140, 50, 0.2)));
    }

    .category-header--starter {
      border-color: rgba(120, 200, 255, 0.55);
      --cat-glow: rgba(100, 190, 255, 0.45);
      box-shadow:
        0 0 18px rgba(80, 170, 255, 0.35),
        0 0 36px rgba(60, 140, 255, 0.15),
        inset 0 0 24px rgba(0, 0, 0, 0.9);
    }

    .category-header--golden {
      border-color: rgba(200, 168, 78, 0.65);
      --cat-glow: rgba(200, 168, 78, 0.25);
      box-shadow:
        0 0 10px rgba(200, 168, 78, 0.2),
        inset 0 0 24px rgba(0, 0, 0, 0.9);
    }

    .category-header--magma {
      border-color: rgba(255, 120, 48, 0.65);
      --cat-glow: rgba(255, 100, 40, 0.35);
      box-shadow:
        0 0 18px rgba(255, 90, 30, 0.35),
        0 0 36px rgba(200, 60, 20, 0.15),
        inset 0 0 24px rgba(0, 0, 0, 0.9);
    }

    .category-title {
      font-family: 'Cinzel Decorative', serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .rune-card-shell {
      position: relative;
      padding: 2px;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .rune-card-shell.rune-clip {
      background: var(--shell-border);
    }

    .rune-card-shell--starter {
      --shell-border: linear-gradient(135deg, #a8e4ff 0%, #4a9fd4 35%, #78c8f5 55%, #2a6a9e 100%);
      filter: drop-shadow(0 0 10px rgba(100, 190, 255, 0.55)) drop-shadow(0 0 22px rgba(60, 150, 255, 0.3));
    }

    .rune-card-shell--golden {
      --shell-border: linear-gradient(135deg, #f0d78a 0%, #a8842a 40%, #c8a84e 60%, #6b5420 100%);
      filter: drop-shadow(0 0 6px rgba(200, 168, 78, 0.35));
    }

    .rune-card-shell--magma {
      --shell-border: linear-gradient(135deg, #ffb080 0%, #c44a18 35%, #ff6a28 55%, #8a2808 100%);
      filter: drop-shadow(0 0 10px rgba(255, 100, 40, 0.55)) drop-shadow(0 0 22px rgba(220, 60, 20, 0.3));
    }

    .rune-card-shell--default {
      --shell-border: linear-gradient(135deg, #8a7060, #3a2a28);
      filter: drop-shadow(0 0 6px rgba(0, 0, 0, 0.5));
    }

    .rune-card-shell:hover {
      transform: translateY(-4px) scale(1.02);
      z-index: 10;
    }

    .rune-card-shell--starter:hover {
      filter: drop-shadow(0 0 14px rgba(120, 200, 255, 0.75)) drop-shadow(0 0 28px rgba(80, 170, 255, 0.4));
    }

    .rune-card-shell--golden:hover {
      filter: drop-shadow(0 0 10px rgba(212, 184, 90, 0.45));
    }

    .rune-card-shell--magma:hover {
      filter: drop-shadow(0 0 14px rgba(255, 120, 50, 0.75)) drop-shadow(0 0 28px rgba(220, 70, 25, 0.4));
    }

    .rune-card {
      position: relative;
      background: #030303;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
    }

    .rune-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(var(--rune-rgb), 0.12) 0%, transparent 55%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.015) 2px,
          rgba(255, 255, 255, 0.015) 3px
        );
      pointer-events: none;
    }

    .rune-card--starter { --rune-rgb: 120, 200, 245; }
    .rune-card--golden { --rune-rgb: 200, 168, 78; }
    .rune-card--magma { --rune-rgb: 255, 110, 48; }
    .rune-card--default { --rune-rgb: 138, 112, 96; }

    .rune-card-inner {
      position: relative;
      z-index: 1;
      padding: 1rem 1.1rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .rune-set-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-weight: 700;
    }

    .rune-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.2;
    }

    .rune-card--starter .rune-set-label,
    .rune-card--starter .rune-name {
      color: #78c8f5;
      text-shadow: 0 0 12px rgba(120, 200, 255, 0.5);
    }

    .rune-card--golden .rune-set-label,
    .rune-card--golden .rune-name {
      color: #c8a84e;
      text-shadow: 0 0 8px rgba(200, 168, 78, 0.35);
    }

    .rune-card--magma .rune-set-label,
    .rune-card--magma .rune-name {
      color: #ff7a38;
      text-shadow: 0 0 8px rgba(255, 100, 40, 0.4);
    }

    .rune-card--default .rune-set-label,
    .rune-card--default .rune-name {
      color: var(--text-main);
    }

    .rune-chance {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .rune-chance--filler { color: #9ad4ff; }
    .rune-chance--locked { color: #5a4a4a; text-decoration: line-through; }

    .filler-badge {
      display: inline-block;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      margin-left: 4px;
      border: 1px solid rgba(154, 212, 255, 0.45);
      color: #9ad4ff;
      vertical-align: middle;
    }

    .rune-card--locked {
      opacity: 0.4;
      filter: grayscale(0.35);
    }
    .rune-card--locked .rune-name,
    .rune-card--locked .rune-chance,
    .rune-card--locked .rune-set-label {
      text-decoration: line-through;
    }

    .rune-card-shell--locked { cursor: default; }

    .set-chance-warn {
      font-size: 0.7rem;
      color: #ff5a36;
      margin-top: 4px;
      font-family: 'Share Tech Mono', monospace;
    }

    .rune-eta-block {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 0.6rem;
      margin-top: 0.15rem;
    }

    .rune-eta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.8rem;
    }

    .rune-eta-row .eta-label {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.65rem;
    }

    .rune-eta-row .eta-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-enter { animation: card-enter 0.45s ease forwards; opacity: 0; }

    .eta-fast { color: #4ade80; transition: color 0.3s; }
    .eta-mid { color: #fb923c; transition: color 0.3s; }
    .eta-slow { color: #f87171; transition: color 0.3s; }
    .eta-none { color: var(--text-muted); }

    .toggle-checkbox { display: none; }
    .toggle-container { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
    .toggle-label {
      display: block; overflow: hidden; cursor: pointer;
      border-radius: 99px; background-color: #1a1012;
      border: 1px solid var(--border-dark); height: 100%; transition: 0.2s;
    }
    .toggle-ball {
      position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
      background: var(--text-main); border-radius: 50%;
      transition: 0.2s; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }
    .toggle-checkbox:checked + .toggle-label {
      background-color: var(--accent-primary);
      border-color: var(--accent-hot);
    }
    .toggle-checkbox:checked + .toggle-label .toggle-ball { transform: translateX(18px); }

    .btn-sort {
      background: rgba(15, 10, 12, 0.8);
      border: 1px solid var(--border-dark);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s; color: var(--text-muted);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn-sort:hover { border-color: var(--accent-primary); color: var(--text-main); }
    .btn-sort.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-hot);
      box-shadow: 0 0 15px rgba(255, 34, 68, 0.25);
    }

    .btn-mobile-config {
      background: var(--accent-primary);
      color: #fff;
      border: 1px solid var(--accent-hot);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .btn-special-filter.active {
      border-color: var(--special-gold) !important;
      box-shadow: 0 0 15px rgba(245, 200, 66, 0.35) !important;
      color: var(--special-gold) !important;
    }

    .stat-line::before {
      content: '◆';
      color: var(--stat-accent, var(--accent-hot));
      margin-right: 6px;
      font-size: 0.5rem;
      vertical-align: middle;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }

    #mainArea {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    @media (min-width: 1024px) {
      #mainArea { height: 100vh; }
    }
  </style>
</head>
<body class="font-body">

  <button type="button" id="toggleSidebar" class="btn-mobile-config lg:hidden fixed top-3 left-3 z-50 font-body">
    ⚔ Config
  </button>

  <aside id="sidebar" class="z-40 lg:z-auto">
    <div class="p-5 pt-14 lg:pt-5 space-y-5">
      <div class="hidden lg:block mb-2">
        <h2 class="font-display text-xl text-[var(--accent-hot)] tracking-wider">⚔ Slayer Config</h2>
      </div>

      <div>
        <label class="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold">Cooldown (Speed)</label>
        <div class="flex items-center gap-2 mt-1">
          <input type="number" id="speed" value="0.15" step="0.01" min="0.01"
            class="input-game w-full px-3 py-2 font-mono text-sm">
          <span class="text-sm text-[var(--text-muted)] whitespace-nowrap">sec</span>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-3">
        <div>
          <label class="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold">Rune Bulk</label>
          <input type="text" id="bulk" placeholder="e.g. 100k" value="1"
            class="input-game w-full px-3 py-2 mt-1 font-mono text-sm">
        </div>
        <div>
          <label class="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold">Rune Luck</label>
          <input type="text" id="luck" placeholder="e.g. 1" value="1"
            class="input-game w-full px-3 py-2 mt-1 font-mono text-sm">
        </div>
      </div>

      <div class="custom-target-box p-4 space-y-3">
        <label class="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold">Custom Target</label>
        <input type="text" id="target" placeholder="e.g. 500k or 1/5OcDe"
          class="input-game w-full px-3 py-2 font-mono text-sm">
        <div>
          <p class="text-[10px] uppercase tracking-widest text-[var(--text-muted)] mb-1">AVG Time</p>
          <p id="customAvg" class="font-mono text-2xl font-bold eta-none">--</p>
        </div>
      </div>

      <div>
        <p class="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold mb-3">Rune Potions</p>
        <div class="space-y-3">
          <div class="flex items-center justify-between gap-3">
            <span class="text-sm"><i class="fas fa-flask text-[var(--accent-hot)] mr-2"></i>Rune Speed Potion <span class="text-[var(--text-muted)] text-xs">(×1.25 Speed)</span></span>
            <div class="toggle-container">
              <input type="checkbox" id="speedPotion" class="toggle-checkbox">
              <label for="speedPotion" class="toggle-label"><span class="toggle-ball"></span></label>
            </div>
          </div>
          <div class="flex items-center justify-between gap-3">
            <span class="text-sm"><i class="fas fa-clover text-[var(--accent-hot)] mr-2"></i>Rune Luck Potion <span class="text-[var(--text-muted)] text-xs">(×1.5 Luck)</span></span>
            <div class="toggle-container">
              <input type="checkbox" id="luckPotion" class="toggle-checkbox">
              <label for="luckPotion" class="toggle-label"><span class="toggle-ball"></span></label>
            </div>
          </div>
        </div>
        <p class="text-[10px] text-[var(--text-muted)] leading-snug mt-2">
          <i class="fas fa-check-circle text-red-400/80 mr-1"></i>
          <strong class="font-normal text-[var(--text-main)]">Filler</strong> when the tier below hits 1/1 (luck/raw ≥ 1) and the tier above is still &lt; 1/1.
        </p>
      </div>
    </div>
  </aside>

  <main id="mainArea" class="flex-1 p-4 pt-14 lg:pt-6 lg:px-8">
    <header class="mb-6 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
      <div>
        <h1 class="font-display text-3xl sm:text-4xl header-title tracking-wide">Slayer Inc</h1>
        <p class="text-sm text-[var(--text-muted)] uppercase tracking-[0.2em] mt-1">Rune Calculator</p>
      </div>
      <div class="bg-[var(--bg-panel)] border border-[var(--border-dark)] rounded-lg px-5 py-3 text-right">
        <p class="text-[10px] uppercase tracking-widest text-[var(--text-muted)]">Effective RPS</p>
        <p id="effectiveRPS" class="font-mono text-2xl text-[var(--accent-hot)]">0</p>
      </div>
    </header>

    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <div class="relative flex-1">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-muted)] text-sm"></i>
        <input type="text" id="runeSearch" placeholder="Search runes..."
          class="input-game w-full pl-10 pr-4 py-2.5 text-sm">
      </div>
      <div class="flex flex-wrap gap-2">
        <button type="button" id="modeCategory" class="btn-sort active" onclick="window.setModeCategory()">
          Total Rune: 0
        </button>
        <button type="button" id="modeAvg" class="btn-sort" onclick="window.setModeAvg()">
          AVG <i id="iconAvg" class="fas fa-sort-amount-up opacity-50 ml-1"></i>
        </button>
      </div>
    </div>

    <div id="noResults" class="text-center py-20 text-[var(--text-muted)]">
      <i class="fas fa-skull text-4xl mb-4 opacity-40"></i>
      <p class="font-display text-xl">No Runes Discovered</p>
      <p class="text-sm mt-2">Add runes to <code class="text-[var(--accent-hot)]">runes.js</code></p>
    </div>

    <div id="runesGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 pb-10"></div>
  </main>

  <script src="suffixes.js"></script>
  <script src="runes.js"></script>
  <script>
    const categoryOrder = window.categoryOrder || [];
    const runeData = window.runeData || [];

    const RUNE_SPEED_POTION_MULT = 1.25;
    const RUNE_LUCK_POTION_MULT = 1.5;
    /** AVG = ETA at 90% confidence (README: base × −ln(1 − 0.9)). */
    const AVG_ETA_CONFIDENCE = 90;

    window.sortConfig = { mode: 'category', direction: 'asc' };
    window.pinnedRunes = new Set();

    const STORAGE_KEY = 'slayerIncCalc_v1';

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          speed: document.getElementById('speed')?.value ?? '',
          bulk: document.getElementById('bulk')?.value ?? '',
          luck: document.getElementById('luck')?.value ?? '',
          target: document.getElementById('target')?.value ?? '',
          speedPotion: !!document.getElementById('speedPotion')?.checked,
          luckPotion: !!document.getElementById('luckPotion')?.checked,
          sortConfig: window.sortConfig,
          pinnedRunes: [...window.pinnedRunes],
          runeSearch: document.getElementById('runeSearch')?.value ?? '',
        }));
      } catch (_) { /* private mode / quota */ }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        const setVal = (id, val) => {
          if (val == null) return;
          const el = document.getElementById(id);
          if (el) el.value = val;
        };
        setVal('speed', state.speed);
        setVal('bulk', state.bulk);
        setVal('luck', state.luck);
        setVal('target', state.target);
        setVal('runeSearch', state.runeSearch);
        const speedPotion = document.getElementById('speedPotion');
        if (speedPotion && typeof state.speedPotion === 'boolean') speedPotion.checked = state.speedPotion;
        const luckPotion = document.getElementById('luckPotion');
        if (luckPotion && typeof state.luckPotion === 'boolean') luckPotion.checked = state.luckPotion;
        if (state.sortConfig?.mode) {
          const mode = state.sortConfig.mode === 'eta' ? 'avg' : state.sortConfig.mode;
          window.sortConfig = {
            mode: mode === 'avg' || mode === 'category' ? mode : 'category',
            direction: state.sortConfig.direction === 'desc' ? 'desc' : 'asc',
          };
        }
        if (Array.isArray(state.pinnedRunes)) {
          window.pinnedRunes = new Set(state.pinnedRunes.filter(k => typeof k === 'string'));
        }
      } catch (_) { /* corrupt data */ }
    }

    function getRuneKey(rune) {
      return `${rune.type}::${rune.name}`;
    }

    const suffixes = window.gameSuffixes || [];

    const sortedSuffixes = [...suffixes].sort((a, b) => b.sym.length - a.sym.length);

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result
        ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}`
        : '192, 57, 43';
    }

    function parseValue(str) {
      if (!str) return 0;
      str = str.toString().toLowerCase().trim();
      if (str.includes('/')) {
        const parts = str.split('/');
        str = parts.length > 1 ? parts[parts.length - 1].trim() : str;
      }
      for (const s of sortedSuffixes) {
        if (str.endsWith(s.sym)) {
          const num = parseFloat(str.slice(0, -s.sym.length));
          return (isNaN(num) ? 1 : num) * s.val;
        }
      }
      return parseFloat(str) || 0;
    }

    function getDispForVal(val) {
      for (let i = suffixes.length - 1; i >= 0; i--) {
        const s = suffixes[i];
        if (s.val === val) return s.disp;
      }
      return '';
    }

    function formatValue(num) {
      if (num === 0) return '0';
      if (!isFinite(num)) return '--';
      if (num < 1000) {
        const v = num.toFixed(2).replace(/\.00$/, '');
        return v;
      }
      const seen = new Set();
      for (let i = suffixes.length - 1; i >= 0; i--) {
        const s = suffixes[i];
        if (seen.has(s.val)) continue;
        seen.add(s.val);
        if (num >= s.val) {
          const scaled = (num / s.val).toFixed(2).replace(/\.00$/, '');
          return scaled + s.disp;
        }
      }
      return num.toExponential(2);
    }

    function formatTime(seconds) {
      if (!isFinite(seconds) || seconds <= 0) return '--';
      if (seconds < 60) return seconds.toFixed(2) + 's';
      const min = Math.floor(seconds / 60);
      if (min < 60) return `${min}m ${Math.floor(seconds % 60)}s`;
      const hrs = Math.floor(min / 60);
      if (hrs < 24) return `${hrs}h ${min % 60}m`;
      const days = Math.floor(hrs / 24);
      return `${days}d ${hrs % 24}h`;
    }

    function getEtaClass(seconds) {
      if (!isFinite(seconds) || seconds <= 0) return 'eta-none';
      if (seconds < 300) return 'eta-fast';
      if (seconds < 3600) return 'eta-mid';
      return 'eta-slow';
    }

    /** README: ETA(X%) = (threshold / totalPower) × −ln(1 − X/100). */
    function getEtaConfidenceMultiplier(percent) {
      const p = Math.min(99, Math.max(1, percent)) / 100;
      return -Math.log(1 - p);
    }

    function getAvgSeconds(base63, confidencePercent = AVG_ETA_CONFIDENCE) {
      if (!isFinite(base63) || base63 <= 0) return 0;
      return base63 * getEtaConfidenceMultiplier(confidencePercent);
    }

    function getRuneTheme(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('starter')) {
        return { shell: 'starter', card: 'starter', accent: '#78c8f5', rgb: '120, 200, 245', icon: 'fa-shield-halved' };
      }
      if (t.includes('golden')) {
        return { shell: 'golden', card: 'golden', accent: '#c8a84e', rgb: '200, 168, 78', icon: 'fa-coins' };
      }
      if (t.includes('magma')) {
        return { shell: 'magma', card: 'magma', accent: '#ff6a28', rgb: '255, 110, 48', icon: 'fa-fire' };
      }
      return { shell: 'default', card: 'default', accent: '#8a7060', rgb: '138, 112, 96', icon: 'fa-gem' };
    }


    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatChanceDisplay(chance) {
      if (!chance) return '--';
      const c = String(chance).trim();
      if (c.toLowerCase().startsWith('1/') || c.includes('/')) return `1 in ${c.replace(/^1\s*\/\s*/i, '')}`;
      return `1 in ${c}`;
    }

    function getRunesInSet(type) {
      return runeData.filter(r => r.type === type);
    }

    function luckRatio(raw, luck) {
      return raw > 0 && luck > 0 ? luck / raw : 0;
    }

    /**
     * Filler = lowest tier where previous (commoner) has luck/raw ≥ 1 and next (rarer) still < 1.
     * Below filler with luck > raw → N/A. Above filler → P = luck/raw.
     */
    function getPoolState(setRunes, luck) {
      const L = luck > 0 ? luck : 0;
      const n = setRunes.length;
      let fillerIdx = 0;

      for (let i = 0; i < n; i++) {
        const rawPrev = i > 0 ? parseValue(setRunes[i - 1].raw) : 0;
        const rawNext = i < n - 1 ? parseValue(setRunes[i + 1].raw) : 0;
        const prevAtLeastOne = i === 0 || luckRatio(rawPrev, L) >= 1;
        const nextBelowOne = i === n - 1 || luckRatio(rawNext, L) < 1;
        if (prevAtLeastOne && nextBelowOne) {
          fillerIdx = i;
          break;
        }
      }

      return { fillerIdx };
    }

    function buildChanceMap(luck) {
      const map = new Map();
      const L = luck > 0 ? luck : 0;
      const types = [...new Set(runeData.map(r => r.type))];

      for (const type of types) {
        const setRunes = getRunesInSet(type);
        if (!setRunes.length) continue;

        const { fillerIdx } = getPoolState(setRunes, L);
        let othersSum = 0;

        for (let i = fillerIdx + 1; i < setRunes.length; i++) {
          const r = setRunes[i];
          const raw = parseValue(r.raw);
          if (raw <= 0) continue;
          const p = L / raw;
          othersSum += p;
          map.set(getRuneKey(r), {
            prob: p,
            rawEffective: raw / L,
            isFiller: false,
            excluded: false,
          });
        }

        const filler = setRunes[fillerIdx];
        const fillerProb = Math.max(0, 1 - othersSum);
        const fillerRawEff = fillerProb > 0 ? 1 / fillerProb : Infinity;
        map.set(getRuneKey(filler), {
          prob: fillerProb,
          rawEffective: fillerRawEff,
          isFiller: true,
          excluded: false,
        });

        for (let i = 0; i < fillerIdx; i++) {
          const r = setRunes[i];
          const raw = parseValue(r.raw);
          if (raw <= 0) continue;
          map.set(getRuneKey(r), {
            prob: 0,
            rawEffective: Infinity,
            isFiller: false,
            excluded: true,
            lockRaw: raw,
          });
        }
      }

      return map;
    }

    function getSetFillerWarning(type, chanceMap) {
      const setRunes = getRunesInSet(type);
      const fillerEntry = setRunes
        .map(r => chanceMap.get(getRuneKey(r)))
        .find(info => info?.isFiller);
      if (fillerEntry && fillerEntry.prob <= 0) {
        return 'Luck too high — active tier odds exceed 100%';
      }
      return '';
    }

    function formatChanceLabel(rune, info) {
      if (info?.excluded) {
        const need = formatValue(info.lockRaw ?? parseValue(rune.raw));
        return '<span class="rune-chance--locked">N/A — unobtainable</span>';
      }
      const denom = formatValue(info.rawEffective);
      if (info?.isFiller) {
        return `<span class="rune-chance--filler">${formatChanceDisplay('1/' + denom)}<span class="filler-badge">filler</span></span>`;
      }
      return formatChanceDisplay('1/' + denom);
    }

    /** Rune threshold for ETA; luck is applied via totalPower (RPS × luck), not here. */
    function getEtaThreshold(rune, chanceMap) {
      const info = chanceMap.get(getRuneKey(rune));
      if (info?.excluded) return Infinity;
      if (info?.isFiller) return info.rawEffective;
      return parseValue(rune.raw);
    }

    window.togglePin = function (key, e) {
      e.stopPropagation();
      if (window.pinnedRunes.has(key)) window.pinnedRunes.delete(key);
      else window.pinnedRunes.add(key);
      window.calculate();
    };

    window.calculate = function () {
      const speedEl = document.getElementById('speed');
      const bulkEl = document.getElementById('bulk');
      const luckEl = document.getElementById('luck');
      const targetEl = document.getElementById('target');
      if (!speedEl || !bulkEl || !luckEl) return;

      let cooldown = parseFloat(speedEl.value) || 0.15;
      const bulkValue = parseValue(bulkEl.value);
      let luckValue = parseValue(luckEl.value);

      if (document.getElementById('speedPotion')?.checked) {
        cooldown /= RUNE_SPEED_POTION_MULT;
      }
      if (document.getElementById('luckPotion')?.checked) {
        luckValue *= RUNE_LUCK_POTION_MULT;
      }

      const effectiveRPS = cooldown > 0 ? bulkValue / cooldown : 0;
      document.getElementById('effectiveRPS').innerText = formatValue(effectiveRPS);

      const totalPower = effectiveRPS * luckValue;
      const target = targetEl ? parseValue(targetEl.value) : 0;
      const customAvgEl = document.getElementById('customAvg');
      if (customAvgEl) {
        if (totalPower > 0 && target > 0) {
          const sec = getAvgSeconds(target / totalPower);
          customAvgEl.innerText = formatTime(sec);
          customAvgEl.className = 'font-mono text-2xl font-bold ' + getEtaClass(sec);
        } else {
          customAvgEl.innerText = '--';
          customAvgEl.className = 'font-mono text-2xl font-bold eta-none';
        }
      }

      renderRunes(totalPower, luckValue);
      saveState();
    };

    window.setModeCategory = function () {
      window.sortConfig.mode = 'category';
      updateSortUI();
      window.calculate();
    };

    window.setModeAvg = function () {
      if (window.sortConfig.mode === 'avg') {
        window.sortConfig.direction = window.sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        window.sortConfig.mode = 'avg';
        window.sortConfig.direction = 'asc';
      }
      updateSortUI();
      window.calculate();
    };

    function updateSortUI() {
      const btnTotal = document.getElementById('modeCategory');
      const btnAvg = document.getElementById('modeAvg');
      const iconAvg = document.getElementById('iconAvg');
      btnTotal.className = window.sortConfig.mode === 'category' ? 'btn-sort active' : 'btn-sort';
      btnAvg.className = window.sortConfig.mode === 'avg' ? 'btn-sort active' : 'btn-sort';
      if (window.sortConfig.mode === 'category') {
        iconAvg.className = 'fas fa-sort-amount-up opacity-50 ml-1';
      } else {
        iconAvg.className = window.sortConfig.direction === 'asc'
          ? 'fas fa-sort-amount-up ml-1'
          : 'fas fa-sort-amount-down ml-1';
      }
    }

    function getCategorySortIndex(type) {
      const idx = categoryOrder.indexOf(type);
      return idx === -1 ? 9999 : idx;
    }

    function getRuneListIndex(rune) {
      const key = getRuneKey(rune);
      const idx = runeData.findIndex(r => getRuneKey(r) === key);
      return idx === -1 ? 9999 : idx;
    }

    /** Default: runes.js order (Common → … → Unknown); unobtainable last. */
    function compareRuneDisplayOrder(a, b, chanceMap) {
      const exA = chanceMap.get(getRuneKey(a))?.excluded ? 1 : 0;
      const exB = chanceMap.get(getRuneKey(b))?.excluded ? 1 : 0;
      if (exA !== exB) return exA - exB;
      return getRuneListIndex(a) - getRuneListIndex(b);
    }

    function getRuneAvg(rune, chanceMap, totalPower) {
      if (chanceMap.get(getRuneKey(rune))?.excluded) return Infinity;
      const threshold = getEtaThreshold(rune, chanceMap);
      if (!isFinite(threshold) || threshold <= 0 || totalPower <= 0) return Infinity;
      return getAvgSeconds(threshold / totalPower) || Infinity;
    }

    function sortRunesForDisplay(list, chanceMap, totalPower) {
      if (window.sortConfig.mode === 'avg') {
        return list.sort((a, b) => {
          const exA = chanceMap.get(getRuneKey(a))?.excluded ? 1 : 0;
          const exB = chanceMap.get(getRuneKey(b))?.excluded ? 1 : 0;
          if (exA !== exB) return exA - exB;
          const ea = getRuneAvg(a, chanceMap, totalPower);
          const eb = getRuneAvg(b, chanceMap, totalPower);
          return window.sortConfig.direction === 'asc' ? ea - eb : eb - ea;
        });
      }
      return list.sort((a, b) => {
        const pinA = window.pinnedRunes.has(getRuneKey(a)) ? 1 : 0;
        const pinB = window.pinnedRunes.has(getRuneKey(b)) ? 1 : 0;
        if (pinA !== pinB) return pinB - pinA;
        const catA = window.pinnedRunes.has(getRuneKey(a)) ? -1 : getCategorySortIndex(a.type);
        const catB = window.pinnedRunes.has(getRuneKey(b)) ? -1 : getCategorySortIndex(b.type);
        if (catA !== catB) return catA - catB;
        return compareRuneDisplayOrder(a, b, chanceMap);
      });
    }

    function renderRunes(totalPower, luck) {
      const grid = document.getElementById('runesGrid');
      if (!grid) return;

      const chanceMap = buildChanceMap(luck);
      const setWarningsShown = new Set();

      const term = (document.getElementById('runeSearch')?.value || '').toLowerCase();

      let filtered = runeData.filter(r =>
        r.name.toLowerCase().includes(term) || r.type.toLowerCase().includes(term)
      );

      sortRunesForDisplay(filtered, chanceMap, totalPower);

      document.getElementById('modeCategory').innerText = `Total Rune: ${filtered.length}`;
      document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);
      grid.innerHTML = '';

      let currentCategory = '';
      let cardIndex = 0;

      filtered.forEach(rune => {
        const runeKey = getRuneKey(rune);
        const chanceInfo = chanceMap.get(runeKey);
        const isLocked = chanceInfo?.excluded;
        const threshold = getEtaThreshold(rune, chanceMap);
        const etaBase63 = totalPower > 0 && isFinite(threshold) && threshold > 0 ? threshold / totalPower : 0;
        const avgSec = isLocked ? NaN : getAvgSeconds(etaBase63);

        const isPinned = window.pinnedRunes.has(runeKey);
        const displayCat =
          isPinned && window.sortConfig.mode === 'category' ? '⭐ Pinned' : rune.type;

        const theme = getRuneTheme(rune.type);
        const pinAccent = '#f5c842';
        const accent = isPinned ? pinAccent : theme.accent;
        const headerTheme = displayCat === '⭐ Pinned' ? 'golden' : theme.shell;

        if (window.sortConfig.mode === 'category' && displayCat !== currentCategory) {
          currentCategory = displayCat;
          const count = filtered.filter(r => {
            if (displayCat === '⭐ Pinned') return window.pinnedRunes.has(getRuneKey(r));
            return r.type === displayCat && !window.pinnedRunes.has(getRuneKey(r));
          }).length;

          const header = document.createElement('div');
          header.className = `col-span-full mt-6 mb-2 category-header rune-clip category-header--${headerTheme}`;
          header.innerHTML = `
            <h2 class="category-title text-xl" style="color:${accent};text-shadow:0 0 16px rgba(${isPinned ? '245,200,66' : theme.rgb},0.45)">${escapeHtml(currentCategory)}</h2>
            <span class="text-xs font-bold uppercase tracking-wider px-3 py-1 font-body" style="color:${accent};border:1px solid ${accent}40">${count} Runes</span>
          `;
          grid.appendChild(header);

          const warnKey = displayCat === '⭐ Pinned' ? null : displayCat;
          if (warnKey && !setWarningsShown.has(warnKey)) {
            setWarningsShown.add(warnKey);
            const warn = getSetFillerWarning(warnKey, chanceMap);
            if (warn) {
              const warnEl = document.createElement('p');
              warnEl.className = 'set-chance-warn col-span-full -mt-1 mb-2 px-1';
              warnEl.textContent = warn;
              grid.appendChild(warnEl);
            }
          }
        }

        const shell = document.createElement('div');
        shell.className = `rune-card-shell rune-clip rune-card-shell--${theme.shell} card-enter${isLocked ? ' rune-card-shell--locked' : ' cursor-pointer'}${isPinned ? ' ring-1 ring-yellow-500/30' : ''}`;
        shell.style.animationDelay = `${(cardIndex % 12) * 0.04}s`;
        cardIndex++;

        shell.onclick = () => {
          if (isLocked) return;
          const rawForTarget = isFinite(threshold) ? formatValue(threshold) : rune.raw;
          document.getElementById('target').value = rawForTarget;
          window.calculate();
        };

        const pinClass = isPinned ? 'text-yellow-400' : 'text-gray-600 hover:text-yellow-400';
        const chanceLabel = formatChanceLabel(rune, chanceInfo);
        const avgDisplay = isLocked ? '--' : formatTime(avgSec);
        const avgClass = isLocked ? 'eta-none' : getEtaClass(avgSec);
        const statsHtml = (rune.stats || [])
          .map(s => `<li class="stat-line text-xs opacity-90" style="--stat-accent:${accent}">${escapeHtml(s)}</li>`)
          .join('');

        shell.innerHTML = `
          <div class="rune-card rune-clip rune-card--${theme.card}${isLocked ? ' rune-card--locked' : ''}">
            <button type="button" class="absolute top-2 right-2 z-20 text-lg ${pinClass} transition-colors"
              onclick='window.togglePin(${JSON.stringify(runeKey)}, event)' aria-label="Pin rune">
              <i class="fas fa-star"></i>
            </button>
            <div class="rune-card-inner">
              <p class="rune-set-label">${escapeHtml(rune.type)}</p>
              <h3 class="rune-name">${escapeHtml(rune.name)}</h3>
              <p class="rune-chance">${chanceLabel}</p>
              <div class="rune-eta-block">
                <div class="rune-eta-row">
                  <span class="eta-label">AVG</span>
                  <span class="eta-value ${avgClass}">${avgDisplay}</span>
                </div>
              </div>
              ${statsHtml ? `<ul class="mt-1 space-y-0.5 pt-2 border-t border-white/5">${statsHtml}</ul>` : ''}
            </div>
          </div>
        `;
        grid.appendChild(shell);
      });
    }

    document.getElementById('toggleSidebar')?.addEventListener('click', () => {
      document.getElementById('sidebar')?.classList.toggle('open');
    });

    ['speed', 'bulk', 'luck', 'target'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', window.calculate);
    });
    ['speedPotion', 'luckPotion'].forEach(id => {
      document.getElementById(id)?.addEventListener('change', window.calculate);
    });
    document.getElementById('runeSearch')?.addEventListener('input', window.calculate);

    loadState();
    updateSortUI();
    window.calculate();
  </script>
</body>
</html>
